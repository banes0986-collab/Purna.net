<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRIGGERBABA | CRAFTHOSTİNG</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- CORE STYLES & AI ELIMINATION --- */
        :root {
            --bg: #050509;
            --primary: #00e5ff; /* Sert Neon Turkuaz */
            --primary-dim: rgba(0, 229, 255, 0.15);
            --card-bg: rgba(18, 18, 35, 0.6); /* Saydam Glass Effect */
            --border: rgba(255, 255, 255, 0.03);
            --text-main: #f0f0f5;
            --text-dim: #9090a0;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: var(--font-body);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 229, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            overflow: hidden; /* Scroll içeride yönetilecek */
        }

        /* --- PRE-HEADER & LOGO AREA --- */
        .app-header {
            height: 70px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1001;
        }

        .header-logo {
            font-family: var(--font-head);
            font-weight: 900; font-size: 1.4rem;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 10px var(--primary);
        }

        /* --- MAIN LAYOUT --- */
        .layout { display: flex; height: 100vh; padding-top: 70px; }

        /* Yan Menü (Premium Sidebar) */
        .sidebar {
            width: 90px; height: calc(100vh - 70px);
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 30px 0;
            transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .sidebar:hover { width: 240px; }

        .nav-btn {
            width: 70px; height: 70px; margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border-radius: 18px;
            position: relative; color: #505060;
        }
        .nav-btn:hover { color: white; background: rgba(255,255,255,0.02); }

        .nav-btn .icon { font-size: 30px; transition: 0.3s; }
        .nav-btn span { 
            position: absolute; left: 85px; opacity: 0; 
            font-family: var(--font-head); font-weight: 600; font-size: 0.8rem;
            letter-spacing: 1px; color: white; transition: 0.3s; white-space: nowrap;
        }
        .sidebar:hover .nav-btn { width: 85%; flex-direction: row; justify-content: flex-start; padding-left: 20px; }
        .sidebar:hover .nav-btn .icon { margin-right: 15px; font-size: 24px; }
        .sidebar:hover .nav-btn span { opacity: 1; }

        .nav-btn.active { 
            background: var(--primary-dim); color: var(--primary); 
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.1);
        }
        .nav-btn.active .icon { text-shadow: 0 0 15px var(--primary); }

        /* Content Area */
        .content { 
            flex: 1; padding: 40px; overflow-y: auto; 
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .tab { display: none; animation: tabFade 0.5s ease; }
        .tab.active-tab { display: block; }
        @keyframes tabFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Typography & Header */
        h1 { font-family: var(--font-head); font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; color: white; }
        .subtitle { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 40px; font-weight: 300; }

        /* Advanced Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 24px;
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }
        .card:hover { border-color: rgba(0, 229, 255, 0.3); transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .card h3 { font-family: var(--font-head); color: var(--primary); margin-bottom: 15px; font-size: 1.3rem; display: flex; align-items: center; gap: 12px; }
        .card p { font-size: 0.95rem; color: var(--text-dim); line-height: 1.6; }

        /* Inputs & Buttons */
        .btn { 
            display: inline-block; width: 100%; padding: 16px; 
            background: white; color: #000; border: none; border-radius: 14px; 
            font-family: var(--font-head); font-weight: 900; font-size: 0.9rem; 
            cursor: pointer; transition: 0.3s; text-align: center; text-decoration: none;
            letter-spacing: 1px;
        }
        .btn:hover { background: var(--primary); box-shadow: 0 0 20px var(--primary); transform: scale(1.02); }

        /* --- MOBILE ADAPTATION (V5) --- */
        @media (max-width: 1024px) {
            h1 { font-size: 2.2rem; }
            .content { padding: 25px; padding-bottom: 120px; }
            .sidebar { 
                width: 100%; height: 90px; 
                flex-direction: row; position: fixed; bottom: 0; left: 0; 
                border-right: none; border-top: 1px solid var(--border);
                padding: 0 15px;
            }
            .sidebar:hover { width: 100%; }
            .nav-btn { width: 60px; height: 60px; margin-bottom: 0; font-size: 28px; }
            .nav-btn span { display: none; }
            .layout { padding-top: 70px; }
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-logo">TRIGGER.CORE</div>
    <div style="font-size: 0.9rem; color: var(--text-dim);">SYSTEM_LATENCY: <span style="color:var(--primary); font-weight:800;">8ms</span></div>
</header>

<div class="layout">
    <nav class="sidebar">
        <div class="nav-btn active" onclick="switchTab('home', this)"><div class="icon">🏠</div><span>DASHBOARD</span></div>
        <div class="nav-btn" onclick="switchTab('tools', this)"><div class="icon">🛠️</div><span>ANALİZ</span></div>
        <div class="nav-btn" onclick="switchTab('mods', this)"><div class="icon">🚀</div><span>MOD MERKEZİ</span></div>
        <div class="nav-btn" onclick="switchTab('clients', this)"><div class="icon">⚔️</div><span>CLIENTLAR</span></div>
        <div class="nav-btn" onclick="switchTab('host', this)"><div class="icon">☁️</div><span>CRAFTHOSTING</span></div>
    </nav>

    <main class="content">
        <div id="home" class="tab active-tab">
            <h1>Hoş geldin, <span style="color:var(--primary)">TriggerBaba</span></h1>
            <p class="subtitle">Sistemler optimize edildi, komutlarını bekliyor.</p>
            <div class="grid">
