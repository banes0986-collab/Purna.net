<div id="page-logs" class="page-container hidden">
    <h2 class="title">Sipariş Yönetimi</h2>
    <div class="table-wrapper">
        <table class="log-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Oyuncu</th>
                    <th>Ürün</th>
                    <th>Tarih</th>
                    <th>Durum</th>
                    <th>İşlem</th>
                </tr>
            </thead>
            <tbody id="admin-order-list"></tbody>
        </table>
    </div>
</div>

<script>
    // Admin listesini doldurma
    function loadAdminOrders() {
        const list = document.getElementById('admin-order-list');
        if(!list) return;
        const orders = JSON.parse(localStorage.getItem('all_orders')) || [];
        list.innerHTML = orders.map(o => `
            <tr>
                <td>${o.id}</td>
                <td>${o.user}</td>
                <td>${o.item}</td>
                <td>${o.date}</td>
                <td><span class="badge ${o.status.toLowerCase()}">${o.status}</span></td>
                <td><button onclick="approveOrder('${o.id}')" class="btn-approve">ONAYLA</button></td>
            </tr>
        `).join('');
    }
    
    function approveOrder(id) {
        let orders = JSON.parse(localStorage.getItem('all_orders'));
        let order = orders.find(o => o.id === id);
        if(order) order.status = 'TAMAMLANDI';
        localStorage.setItem('all_orders', JSON.stringify(orders));
        loadAdminOrders();
    }
    
    setInterval(loadAdminOrders, 2000);
</script>
